version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma
    networks:
      - rag_network

  backend:
    build: .
    container_name: rag_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - chromadb
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - rag_network

  frontend:
    build: .
    container_name: rag_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    networks:
      - rag_network

volumes:
  postgres_data:
  chroma_data:

networks:
  rag_network:
    driver: bridge